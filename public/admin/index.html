<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pillet & Partners — Administration</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
      }

      /* Typographie globale */
      #nc-root,
      #nc-root input,
      #nc-root textarea,
      #nc-root select,
      #nc-root button {
        font-family: 'Inter', sans-serif !important;
      }

      /* Titres → Spectral */
      #nc-root h1,
      #nc-root [class*="CardHeading"],
      #nc-root [class*="ListCardTitle"] {
        font-family: 'Spectral', serif !important;
        font-weight: 400 !important;
        color: #0E3A5C !important;
      }

      /* Labels de champs */
      #nc-root label,
      #nc-root [class*="FieldLabel"] {
        font-weight: 600 !important;
        color: #1A2733 !important;
        font-size: 13px !important;
        letter-spacing: 0.04em;
      }

      /* Focus inputs → bleu Pillet */
      #nc-root input:focus,
      #nc-root textarea:focus {
        outline-color: #1A5E86 !important;
        border-color: #1A5E86 !important;
      }

      /* Scrollbar discrète */
      #nc-root * {
        scrollbar-width: thin;
        scrollbar-color: #B7A079 #f0ece4;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
