backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

site_url: https://pillet-partners.ch
display_url: https://pillet-partners.ch
logo_url: https://pillet-partners.ch/assets/logo.png

locale: "fr"

slug:
  encoding: "ascii"
  clean_accents: true

collections:

  # ─────────────────────────────────────────────
  # PAGE D'ACCUEIL — une section = un formulaire
  # ─────────────────────────────────────────────
  - name: "home"
    label: "Page d'accueil"
    delete: false
    editor:
      preview: false
    files:

      - name: "hero"
        label: "🏠 Bannière principale"
        file: "src/content/home/hero.json"
        fields:
          - label: "Sur-titre"
            name: "eyebrow"
            widget: "string"
            hint: "Petite ligne au-dessus du titre. Ex : Conseil stratégique · Suisse romande"
          - label: "Titre — début"
            name: "title"
            widget: "string"
          - label: "Titre — mots en italique bleu"
            name: "titleAccent"
            widget: "string"
            hint: "Ces mots apparaissent en italique bleu dans le titre."
          - label: "Titre — fin"
            name: "titleEnd"
            widget: "string"
          - label: "Texte d'introduction"
            name: "subtitle"
            widget: "text"
          - label: "Bouton principal"
            name: "ctaPrimary"
            widget: "object"
            fields:
              - { label: "Texte du bouton", name: "label", widget: "string" }
              - { label: "Lien", name: "href", widget: "string" }
          - label: "Bouton secondaire"
            name: "ctaSecondary"
            widget: "object"
            fields:
              - { label: "Texte du bouton", name: "label", widget: "string" }
              - { label: "Lien", name: "href", widget: "string" }

      - name: "signature"
        label: "🌲 Bandeau citation"
        file: "src/content/home/signature.json"
        fields:
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - label: "Citation — début"
            name: "quote"
            widget: "string"
            hint: "Début de la phrase, avant les mots mis en valeur."
          - label: "Citation — mots en italique doré"
            name: "quoteAccent"
            widget: "string"
            hint: "Ces mots apparaissent en italique doré."
          - { label: "Citation — fin", name: "quoteEnd", widget: "string" }
          - label: "Photo de fond"
            name: "image"
            widget: "image"
            hint: "Photo pleine largeur derrière la citation. Format paysage recommandé."

      - name: "challenges"
        label: "⚡ Les défis"
        file: "src/content/home/challenges.json"
        fields:
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H2)", name: "title", widget: "string" }
          - { label: "Texte d'introduction", name: "intro", widget: "text" }
          - label: "Fin de l'intro (italique)"
            name: "introAccent"
            widget: "string"
            hint: "Cette phrase apparaît en italique à la fin du paragraphe."
          - label: "Liste des défis"
            name: "items"
            widget: "list"
            label_singular: "Défi"
            field: { label: "Défi", name: "text", widget: "string" }
          - { label: "Phrase de conclusion", name: "conclusion", widget: "text" }

      - name: "domains"
        label: "🎯 Nos domaines"
        file: "src/content/home/domains.json"
        fields:
          - { label: "Titre (H2)", name: "title", widget: "string" }
          - { label: "Sur-titre (côté droit)", name: "eyebrow", widget: "string" }
          - label: "Domaines"
            name: "items"
            widget: "list"
            label_singular: "Domaine"
            summary: "{{fields.number}} — {{fields.title}}"
            fields:
              - { label: "Numéro", name: "number", widget: "string", hint: "Ex : 01, 02…" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Lien", name: "href", widget: "string", required: false, hint: "Laisser vide si la page n'existe pas encore." }
          - label: "Afficher les exemples de situations"
            name: "situationsActive"
            widget: "boolean"
            default: true
            hint: "Affiche ou masque le bloc d'exemples sous la liste des domaines."
          - label: "Titre — exemples de situations"
            name: "situationsTitle"
            widget: "string"
            required: false
            hint: "Ex : Exemples de situations concrètes"
          - label: "Exemples de situations concrètes"
            name: "situations"
            widget: "list"
            required: false
            hint: "1 à 2 phrases courtes pour que les visiteurs se reconnaissent."
            field: { label: "Situation", name: "item", widget: "string" }

      - name: "approach"
        label: "🔄 Notre approche"
        file: "src/content/home/approach.json"
        fields:
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Sous-titre", name: "subtitle", widget: "text" }
          - label: "Les 4 étapes"
            name: "steps"
            widget: "list"
            label_singular: "Étape"
            summary: "{{fields.name}}"
            fields:
              - { label: "Nom de l'étape", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "why-us"
        label: "👤 Pourquoi nous"
        file: "src/content/home/why-us.json"
        fields:
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H2)", name: "title", widget: "string" }
          - label: "Portrait"
            name: "portrait"
            widget: "image"
            hint: "Photo portrait verticale (600×800 px recommandé)."
          - { label: "Nom (affiché en italique)", name: "portraitName", widget: "string" }
          - { label: "Rôle", name: "portraitRole", widget: "string" }
          - label: "Les 4 raisons"
            name: "reasons"
            widget: "list"
            label_singular: "Raison"
            summary: "{{fields.title}}"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

      - name: "audience"
        label: "👥 Pour qui ?"
        file: "src/content/home/audience.json"
        fields:
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - label: "Profils (pastilles)"
            name: "items"
            widget: "list"
            label_singular: "Profil"
            hint: "Chaque profil apparaît sous forme de pastille arrondie."
            field: { label: "Profil", name: "label", widget: "string" }

      - name: "final-cta"
        label: "✉️ Appel à l'action final"
        file: "src/content/home/final-cta.json"
        fields:
          - { label: "Titre (H2)", name: "title", widget: "string" }
          - { label: "Texte", name: "text", widget: "text" }
          - label: "Bouton"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Texte du bouton", name: "label", widget: "string" }
              - { label: "Lien", name: "href", widget: "string" }

      - name: "seo"
        label: "🔍 SEO & Référencement"
        file: "src/content/home/seo.json"
        fields:
          - label: "Titre de l'onglet"
            name: "title"
            widget: "string"
            hint: "Affiché dans l'onglet et sur Google (60 caractères max)."
          - label: "Description (méta)"
            name: "description"
            widget: "text"
            hint: "Résumé affiché sur Google (160 caractères max)."

  # ─────────────────────────────────────────────
  # PAGES DE SERVICES
  # ─────────────────────────────────────────────
  - name: "services"
    label: "Pages de services"
    delete: false
    editor:
      preview: false
    files:

      - name: "transitions-strategiques"
        label: "🔀 Transitions stratégiques"
        file: "src/content/services/transitions-strategiques.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - label: "Photo hero (bannière)"
            name: "image"
            widget: "image"
            required: false
            hint: "Photo affichée en arrière-plan de la bannière principale"
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Introduction", name: "intro", widget: "text" }
          - { label: "Titre — situations", name: "situationsTitle", widget: "string" }
          - label: "Situations fréquentes"
            name: "situations"
            widget: "list"
            field: { label: "Situation", name: "item", widget: "string" }
          - { label: "Titre — services apportés", name: "servicesTitle", widget: "string" }
          - label: "Ce que nous apportons"
            name: "services"
            widget: "list"
            field: { label: "Service", name: "item", widget: "string" }
          - { label: "Titre — résultats", name: "resultsTitle", widget: "string" }
          - label: "Résultats"
            name: "results"
            widget: "list"
            field: { label: "Résultat", name: "item", widget: "string" }

      - name: "transformation-organisationnelle"
        label: "🏗 Transformation organisationnelle"
        file: "src/content/services/transformation-organisationnelle.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - label: "Photo hero (bannière)"
            name: "image"
            widget: "image"
            required: false
            hint: "Photo affichée en arrière-plan de la bannière principale"
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Introduction", name: "intro", widget: "text" }
          - { label: "Titre — situations", name: "situationsTitle", widget: "string" }
          - label: "Situations"
            name: "situations"
            widget: "list"
            field: { label: "Situation", name: "item", widget: "string" }
          - { label: "Titre — interventions", name: "servicesTitle", widget: "string" }
          - label: "Nos interventions"
            name: "services"
            widget: "list"
            field: { label: "Intervention", name: "item", widget: "string" }
          - { label: "Titre — résultats", name: "resultsTitle", widget: "string" }
          - label: "Résultats"
            name: "results"
            widget: "list"
            field: { label: "Résultat", name: "item", widget: "string" }

      - name: "transmission-gouvernance"
        label: "🤝 Transmission & gouvernance"
        file: "src/content/services/transmission-gouvernance.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - label: "Photo hero (bannière)"
            name: "image"
            widget: "image"
            required: false
            hint: "Photo affichée en arrière-plan de la bannière principale"
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Introduction", name: "intro", widget: "text" }
          - { label: "Titre — contextes", name: "situationsTitle", widget: "string" }
          - label: "Contextes d'intervention"
            name: "situations"
            widget: "list"
            field: { label: "Contexte", name: "item", widget: "string" }
          - { label: "Titre — accompagnement", name: "servicesTitle", widget: "string" }
          - label: "Notre accompagnement"
            name: "services"
            widget: "list"
            field: { label: "Action", name: "item", widget: "string" }
          - { label: "Titre — résultats", name: "resultsTitle", widget: "string" }
          - label: "Résultats"
            name: "results"
            widget: "list"
            field: { label: "Résultat", name: "item", widget: "string" }

      - name: "direction-strategique-externalisee"
        label: "📋 Direction stratégique externalisée"
        file: "src/content/services/direction-strategique-externalisee.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - label: "Photo hero (bannière)"
            name: "image"
            widget: "image"
            required: false
            hint: "Photo affichée en arrière-plan de la bannière principale"
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Introduction", name: "intro", widget: "text" }
          - { label: "Titre — interventions", name: "situationsTitle", widget: "string" }
          - label: "Interventions"
            name: "situations"
            widget: "list"
            field: { label: "Intervention", name: "item", widget: "string" }
          - { label: "Titre — apports", name: "servicesTitle", widget: "string" }
          - label: "Ce que vous gagnez"
            name: "services"
            widget: "list"
            field: { label: "Apport", name: "item", widget: "string" }
          - { label: "Titre — formats", name: "formatsTitle", widget: "string" }
          - label: "Formats d'intervention"
            name: "formats"
            widget: "list"
            label_singular: "Format"
            summary: "{{fields.label}}"
            fields:
              - { label: "Format", name: "label", widget: "string", hint: "Ex : 1 jour par mois" }
          - { label: "Titre — résultats", name: "resultsTitle", widget: "string" }
          - label: "Résultats"
            name: "results"
            widget: "list"
            field: { label: "Résultat", name: "item", widget: "string" }

  # ─────────────────────────────────────────────
  # PAGE À PROPOS
  # ─────────────────────────────────────────────
  - name: "about"
    label: "Page À propos"
    delete: false
    editor:
      preview: false
    files:
      - name: "about"
        label: "👤 Line Pillet — À propos"
        file: "src/content/about.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - label: "Photo hero (bannière)"
            name: "heroImage"
            widget: "image"
            required: false
            hint: "Photo affichée en arrière-plan de la bannière principale"
          - label: "Photo portrait"
            name: "portraitImage"
            widget: "image"
            required: false
            hint: "Photo de profil affichée dans la section biographie"
          - label: "URL LinkedIn personnel (Line Pillet)"
            name: "linkedinPersonal"
            widget: "string"
            required: false
            hint: "Lien vers le profil LinkedIn de Line Pillet (ex: https://www.linkedin.com/in/linepillet)"
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Phrase d'accroche", name: "intro", widget: "text" }
          - { label: "Biographie", name: "bio", widget: "text" }
          - { label: "Conviction (citation)", name: "conviction", widget: "text" }
          - { label: "Titre — engagement", name: "roleTitle", widget: "string" }
          - { label: "Texte — engagement", name: "roleText", widget: "text" }
          - { label: "Titre — réseau", name: "networkTitle", widget: "string" }
          - { label: "Intro réseau", name: "networkIntro", widget: "text" }
          - label: "Domaines d'expertise du réseau"
            name: "networkItems"
            widget: "list"
            field: { label: "Domaine", name: "item", widget: "string" }

  # ─────────────────────────────────────────────
  # PAGE RÉFÉRENCES
  # ─────────────────────────────────────────────
  - name: "references"
    label: "⭐ Page Références"
    delete: false
    editor:
      preview: false
    files:

      - name: "references-hero"
        label: "🖼 Bannière principale"
        file: "src/content/references/hero.json"
        fields:
          - label: "Photo hero (bannière)"
            name: "heroImage"
            widget: "image"
            required: false
            hint: "Photo pleine largeur en arrière-plan. Format paysage recommandé."
          - label: "Sur-titre"
            name: "eyebrow"
            widget: "string"
            hint: "Petite ligne au-dessus du titre."
          - label: "Titre (H1)"
            name: "pageTitle"
            widget: "string"

      - name: "references-intro"
        label: "📊 Introduction & chiffres clés"
        file: "src/content/references/intro.json"
        fields:
          - label: "Texte d'introduction"
            name: "text"
            widget: "text"
            hint: "Phrase d'accroche expliquant l'origine des références."
          - label: "Chiffres & repères (encadré)"
            name: "stats"
            widget: "list"
            hint: "Chaque ligne apparaît dans l'encadré latéral."
            field: { label: "Repère", name: "item", widget: "string" }

      - name: "references-challenges"
        label: "🎯 Défis relevés"
        file: "src/content/references/challenges.json"
        fields:
          - label: "Afficher cette section"
            name: "active"
            widget: "boolean"
            default: true
          - { label: "Titre de la section", name: "title", widget: "string" }
          - { label: "Texte d'introduction", name: "intro", widget: "text" }
          - label: "Exemples de missions"
            name: "items"
            widget: "list"
            label_singular: "Mission"
            summary: "{{fields.number}}. {{fields.title}}"
            fields:
              - { label: "Numéro", name: "number", widget: "string", hint: "Ex : 01" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Contexte", name: "context", widget: "text", hint: "La situation de départ de l'organisation." }
              - { label: "Intervention", name: "intervention", widget: "text", hint: "Ce qui a été mis en place concrètement." }
              - { label: "Impact", name: "impact", widget: "text", hint: "Les résultats obtenus." }

      - name: "references-testimonials"
        label: "💬 Témoignages"
        file: "src/content/references/testimonials.json"
        fields:
          - label: "Afficher cette section"
            name: "active"
            widget: "boolean"
            default: true
          - { label: "Titre de la section", name: "title", widget: "string" }
          - label: "Témoignages"
            name: "items"
            widget: "list"
            label_singular: "Témoignage"
            summary: "{{fields.author}}"
            fields:
              - { label: "Citation", name: "quote", widget: "text" }
              - { label: "Auteur / fonction", name: "author", widget: "string", hint: "Ex : DRH d'un groupe industriel" }

      - name: "references-seo"
        label: "🔍 SEO & Référencement"
        file: "src/content/references/seo.json"
        fields:
          - label: "Titre de l'onglet"
            name: "title"
            widget: "string"
            hint: "Affiché dans l'onglet et sur Google (60 caractères max)."
          - label: "Description (méta)"
            name: "description"
            widget: "text"
            hint: "Résumé affiché sur Google (160 caractères max)."

  # ─────────────────────────────────────────────
  # PAGE CONTACT
  # ─────────────────────────────────────────────
  - name: "contact"
    label: "✉️ Page Contact"
    delete: false
    editor:
      preview: false
    files:
      - name: "contact"
        label: "✉️ Formulaire de contact"
        file: "src/content/contact.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - { label: "Sur-titre", name: "eyebrow", widget: "string" }
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Texte d'introduction", name: "lead", widget: "text" }
          - label: "Champ — Nom complet"
            name: "fieldName"
            widget: "object"
            fields:
              - { label: "Libellé", name: "label", widget: "string" }
              - { label: "Placeholder", name: "placeholder", widget: "string" }
          - label: "Champ — E-mail"
            name: "fieldEmail"
            widget: "object"
            fields:
              - { label: "Libellé", name: "label", widget: "string" }
              - { label: "Placeholder", name: "placeholder", widget: "string" }
          - label: "Champ — Téléphone"
            name: "fieldPhone"
            widget: "object"
            fields:
              - { label: "Libellé", name: "label", widget: "string" }
              - { label: "Placeholder", name: "placeholder", widget: "string" }
          - label: "Champ — Sujet"
            name: "fieldSubject"
            widget: "object"
            fields:
              - { label: "Libellé", name: "label", widget: "string" }
              - { label: "Placeholder (option vide)", name: "placeholder", widget: "string" }
          - label: "Options du menu Sujet"
            name: "subjects"
            widget: "list"
            field: { label: "Sujet", name: "item", widget: "string" }
          - label: "Champ — Message"
            name: "fieldMessage"
            widget: "object"
            fields:
              - { label: "Libellé", name: "label", widget: "string" }
              - { label: "Placeholder", name: "placeholder", widget: "text" }
          - { label: "Note de confidentialité", name: "confidentiality", widget: "string" }
          - { label: "Texte du bouton", name: "submitLabel", widget: "string" }

  # ─────────────────────────────────────────────
  # PARAMÈTRES PIED DE PAGE
  # ─────────────────────────────────────────────
  - name: "footer"
    label: "🔗 Réseaux sociaux"
    delete: false
    editor:
      preview: false
    files:
      - name: "footer"
        label: "🔗 Liens & réseaux sociaux"
        file: "src/content/settings/footer.json"
        fields:
          - label: "URL LinkedIn (entreprise)"
            name: "linkedin"
            widget: "string"
            required: false
            hint: "Laisser vide pour masquer l'icône LinkedIn (ex: https://www.linkedin.com/company/pillet-partners)"
          - label: "Adresse"
            name: "address"
            widget: "string"
            required: false
          - label: "E-mail"
            name: "email"
            widget: "string"
            required: false
          - label: "Téléphone"
            name: "phone"
            widget: "string"
            required: false

  # ─────────────────────────────────────────────
  # PAGES LÉGALES
  # ─────────────────────────────────────────────
  - name: "legal"
    label: "⚖️ Pages légales"
    delete: false
    editor:
      preview: false
    files:
      - name: "confidentialite"
        label: "🔒 Politique de confidentialité"
        file: "src/content/legal/confidentialite.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Contenu", name: "content", widget: "markdown" }
      - name: "mentions-legales"
        label: "📋 Mentions légales"
        file: "src/content/legal/mentions-legales.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre onglet", name: "title", widget: "string" }
              - { label: "Description méta", name: "description", widget: "text" }
          - label: "Afficher dans le pied de page"
            name: "actif"
            widget: "boolean"
            default: false
            hint: "Activer uniquement quand le contenu est prêt à être publié"
          - { label: "Titre (H1)", name: "title", widget: "string" }
          - { label: "Contenu", name: "content", widget: "markdown", required: false }

  # ─────────────────────────────────────────────
  # BLOG
  # ─────────────────────────────────────────────
  - name: "blog"
    label: "📝 Articles de blog — Bientôt disponible"
    label_singular: "Article"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Description (résumé)", name: "description", widget: "string", required: false }
      - { label: "Contenu", name: "body", widget: "markdown" }
