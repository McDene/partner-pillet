backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

locale: "fr"

slug:
  encoding: "ascii"
  clean_accents: true

collections:
  - name: "home"
    label: "Page d'accueil"
    delete: false
    editor:
      preview: false
    files:
      - name: "index"
        label: "Contenu de la page d'accueil"
        file: "src/content/home/index.json"
        fields:

          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Titre (balise <title>)", name: "title", widget: "string" }
              - { label: "Méta description", name: "description", widget: "text" }

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre — début", name: "title", widget: "string" }
              - { label: "Titre — mot en valeur (italique bleu)", name: "titleAccent", widget: "string" }
              - { label: "Titre — fin", name: "titleEnd", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "text" }
              - label: "Bouton principal"
                name: "ctaPrimary"
                widget: "object"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien", name: "href", widget: "string" }
              - label: "Bouton secondaire"
                name: "ctaSecondary"
                widget: "object"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien", name: "href", widget: "string" }

          - label: "Bandeau signature"
            name: "signature"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Citation — début", name: "quote", widget: "string" }
              - { label: "Citation — mots en valeur (italique doré)", name: "quoteAccent", widget: "string" }
              - { label: "Citation — fin", name: "quoteEnd", widget: "string" }
              - { label: "Image de fond", name: "image", widget: "image" }

          - label: "Les défis"
            name: "challenges"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre (H2)", name: "title", widget: "string" }
              - { label: "Introduction", name: "intro", widget: "text" }
              - { label: "Fin de l'intro (italique)", name: "introAccent", widget: "string" }
              - label: "Liste des défis"
                name: "items"
                widget: "list"
                field: { label: "Défi", name: "text", widget: "string" }
              - { label: "Phrase de conclusion", name: "conclusion", widget: "text" }

          - label: "Nos domaines d'accompagnement"
            name: "domains"
            widget: "object"
            fields:
              - { label: "Titre (H2)", name: "title", widget: "string" }
              - { label: "Sur-titre (droite)", name: "eyebrow", widget: "string" }
              - label: "Domaines"
                name: "items"
                widget: "list"
                summary: "{{fields.number}} — {{fields.title}}"
                fields:
                  - { label: "Numéro", name: "number", widget: "string" }
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Lien (page détail)", name: "href", widget: "string", required: false }

          - label: "Notre approche"
            name: "approach"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Sous-titre", name: "subtitle", widget: "text" }
              - label: "Étapes (4)"
                name: "steps"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Nom", name: "name", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Pourquoi Pillet & Partners"
            name: "whyUs"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - { label: "Titre (H2)", name: "title", widget: "string" }
              - { label: "Portrait", name: "portrait", widget: "image" }
              - { label: "Nom (italique dans la légende)", name: "portraitName", widget: "string" }
              - { label: "Rôle (suite de la légende)", name: "portraitRole", widget: "string" }
              - label: "Raisons (4)"
                name: "reasons"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Titre", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Pour qui ?"
            name: "audience"
            widget: "object"
            fields:
              - { label: "Sur-titre", name: "eyebrow", widget: "string" }
              - label: "Profils (pastilles)"
                name: "items"
                widget: "list"
                field: { label: "Profil", name: "label", widget: "string" }

          - label: "Appel à l'action final"
            name: "finalCta"
            widget: "object"
            fields:
              - { label: "Titre (H2)", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "text" }
              - label: "Bouton"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "Libellé", name: "label", widget: "string" }
                  - { label: "Lien", name: "href", widget: "string" }

  - name: "blog"
    label: "Articles"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Contenu", name: "body", widget: "markdown" }
